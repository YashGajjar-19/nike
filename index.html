<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike</title>

    <!-- Light mode favicon -->
    <link rel="icon" href="./assets/images/logo/favicon (black).ico" media="(prefers-color-scheme: light)" />

    <!-- Dark mode favicon -->
    <link rel="icon" href="./assets/images/logo/favicon (white).ico" media="(prefers-color-scheme: dark)" />

    <!-- Google fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />

    <!-- Locomotive Scroll -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar -->
    <nav id="navbar">
        <div id="navleft">
            <img class="img1" src="./assets/images/logo/logo (2).png" alt="Nike">
            <img class="img2" src="./assets/images/logo/logo (1).png" alt="Nike">
        </div>

        <div id="navright">
            <div id="links">
                <a href=""> SHOP </a>
                <a href=""> RUNNING </a>
                <a href=""> TRAINING </a>
                <a href=""> FOOTBALL </a>
                <a href=""> JOIN US </a>
            </div>

            <div id="icons">
                <span class="material-symbols-rounded">
                    equal
                </span>

                <span class="material-symbols-rounded">
                    shopping_cart
                </span>
            </div>
        </div>
    </nav>

    <!-- Cursor -->
    <div id="cursor"></div>

    <!-- Main Container -->
    <div id="main">
        <div id="page1">
            <!-- Hero title -->
            <div id="page1-part1">
                <h1> Move </h1>
                <h1> the Future. </h1>
            </div>

            <!-- Hero video -->
            <div id="video-container">
                <video autoplay muted loop src="./assets/video/video.mp4"></video>
            </div>
        </div>

        <div id="page2"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.js"></script>
    <script src="script.js"></script>

</body>

</html>
